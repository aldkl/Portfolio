<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="이창준 포트폴리오 프로젝트 상세">
    <title>Project | 이창준 Portfolio</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html#top" aria-label="이창준 포트폴리오 홈">이창준</a>
      <nav class="nav" aria-label="Primary navigation">
        <a class="nav__about" href="index.html#about">소개</a>
        <a href="index.html#projects">프로젝트</a>
        <a href="index.html#freelance">외주</a>
        <a href="index.html#studies">연구/과제</a>
      </nav>
      <div class="language-switcher notranslate" aria-label="언어 선택">
        <button type="button" data-language="ko" lang="ko">KO</button>
        <button type="button" data-language="en" lang="en">EN</button>
        <button type="button" data-language="ja" lang="ja">JP</button>
      </div>
    </header>

    <main class="detail-page" data-project-detail>
      <section class="detail-hero" aria-labelledby="project-title">
        <div class="section__inner detail-hero__inner">
          <div>
            <a class="back-link" href="index.html#projects">작업 목록</a>
            <ul class="tag-list tag-list--detail" data-project-tags></ul>
            <h1 id="project-title" data-project-title>Project</h1>
            <p class="hero__copy" data-project-summary></p>
            <div class="project-links" data-project-links></div>
          </div>
          <img class="detail-hero__image" data-project-image alt="">
        </div>
      </section>

      <section class="section" aria-labelledby="project-info-title">
        <div class="section__inner detail-layout">
          <div>
            <p class="section__label">Overview</p>
            <h2 id="project-info-title">문제 해결</h2>
            <div class="learning-grid">
              <section>
                <h3>문제</h3>
                <p data-project-problem></p>
              </section>
              <section>
                <h3>해결</h3>
                <p data-project-solution></p>
              </section>
              <section>
                <h3>배운점</h3>
                <p data-project-learned></p>
              </section>
            </div>
            <h2 class="subsection-title">내가 한 작업</h2>
            <p data-project-role></p>
          </div>
          <dl class="detail-specs" data-project-specs></dl>
        </div>
      </section>

      <section class="section section--muted" aria-labelledby="content-title">
        <div class="section__inner">
          <div class="section-heading">
            <div>
              <p class="section__label">Details</p>
              <h2 id="content-title" data-detail-content-title>상세 작업 내용</h2>
            </div>
          </div>
          <div data-project-content></div>
        </div>
      </section>
    </main>

    <footer id="contact" class="footer">
      <span>© 2026 이창준 Portfolio · wns0134@gmail.com</span>
    </footer>
    <script src="scripts/portfolio-data.js"></script>
    <script src="scripts/work-content.js"></script>
    <script src="scripts/tag-utils.js"></script>
    <script src="scripts/render-project-detail.js"></script>
    <script src="scripts/locales.js"></script>
    <script src="scripts/i18n.js"></script>
  </body>
</html>
